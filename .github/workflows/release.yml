name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build debug and staging APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          MAPTILER_API_KEY=${{ secrets.MAPTILER_API_KEY }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          MQTT_BROKER_PORT=1884
          EOF

      - name: Build APKs
        run: ./gradlew assembleDebug assembleStaging

      - name: Rename APKs
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/pei-automotive-${TAG}-debug.apk
          mv app/build/outputs/apk/staging/app-staging.apk \
             app/build/outputs/apk/staging/pei-automotive-${TAG}-staging.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pei-automotive-apks
          path: |
            app/build/outputs/apk/debug/pei-automotive-*-debug.apk
            app/build/outputs/apk/staging/pei-automotive-*-staging.apk
          retention-days: 30

      - name: Build release body
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Auto-generate the "What's Changed" section (PRs + contributors)
          AUTO=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${TAG}" \
            --jq '.body' || echo "")

          BODY="## PEI Automotive — ${TAG}

          Android Automotive OS app for real-time vehicle telematics and safety alerting, targeting Android Automotive OS and backed by Eclipse Ditto / Hono on a Cloud2Edge Kubernetes cluster.

          ### Build variants

          | Variant | File | Backend target |
          |---------|------|----------------|
          | **debug** | \`pei-automotive-${TAG}-debug.apk\` | Android emulator on your dev machine — connects to \`10.0.2.2\` (host bridge) |
          | **staging** | \`pei-automotive-${TAG}-staging.apk\` | Cloud2Edge staging VM at \`10.255.28.243\` |

          Both APKs are signed with the Android debug keystore and can be sideloaded directly onto any device or emulator without additional setup.

          ---

          ${AUTO}"

          {
            echo 'body<<RELEASE_EOF'
            echo "$BODY"
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            app/build/outputs/apk/debug/pei-automotive-*-debug.apk
            app/build/outputs/apk/staging/pei-automotive-*-staging.apk
