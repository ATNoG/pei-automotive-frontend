name: Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag override (e.g. v1.0.0); defaults to auto-generated'
        required: false
        type: string

jobs:
  build:
    name: Build debug and staging APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date -u +%Y.%m.%d)
            echo "value=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          MAPTILER_API_KEY=${{ secrets.MAPTILER_API_KEY }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          MQTT_BROKER_PORT=1884
          EOF

      - name: Build APKs
        run: ./gradlew assembleDebug assembleStaging

      - name: Rename APKs
        run: |
          TAG=${{ steps.tag.outputs.value }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/pei-automotive-${TAG}-debug.apk
          mv app/build/outputs/apk/staging/app-staging.apk \
             app/build/outputs/apk/staging/pei-automotive-${TAG}-staging.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pei-automotive-apks
          path: |
            app/build/outputs/apk/debug/pei-automotive-*-debug.apk
            app/build/outputs/apk/staging/pei-automotive-*-staging.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: |
            ## PEI Automotive — ${{ steps.tag.outputs.value }}

            Android Automotive OS app for real-time vehicle telematics and safety alerting, targeting Android Automotive OS and backed by Eclipse Ditto / Hono on a Cloud2Edge Kubernetes cluster.

            ### Build variants

            | Variant | File | Backend target |
            |---------|------|----------------|
            | **debug** | `pei-automotive-${{ steps.tag.outputs.value }}-debug.apk` | Android emulator — connects to `10.0.2.2` (host bridge) |
            | **staging** | `pei-automotive-${{ steps.tag.outputs.value }}-staging.apk` | Cloud2Edge staging VM at `10.255.28.243` |

            Both APKs are signed with the Android debug keystore and can be sideloaded directly.

            ---

          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/pei-automotive-*-debug.apk
            app/build/outputs/apk/staging/pei-automotive-*-staging.apk
