name: build

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build:
        name: debug and staging APKs
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v4

            - name: Write local.properties
              run: |
                  cat > local.properties << EOF
                  sdk.dir=$ANDROID_HOME
                  MAPTILER_API_KEY=${{ secrets.MAPTILER_API_KEY }}
                  OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
                  OPENROUTESERVICE_API_KEY=${{ secrets.OPENROUTESERVICE_API_KEY }}
                  MQTT_BROKER_PORT=1884
                  PREFERENCES_BASE_URL=http://10.0.2.2:8082
                  EOF

            - name: Build APKs
              run: ./gradlew assembleDebug assembleStaging
