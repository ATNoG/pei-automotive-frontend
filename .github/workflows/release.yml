name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build staging release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
          MAPTILER_API_KEY=${{ secrets.MAPTILER_API_KEY }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          OPENROUTESERVICE_API_KEY=${{ secrets.OPENROUTESERVICE_API_KEY }}
          MQTT_BROKER_ADDRESS=10.255.28.243
          MQTT_BROKER_PORT=1884
          KEYCLOAK_BASE_URL=http://10.255.28.243:8081
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          mv app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/pei-automotive-${TAG}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pei-automotive-apk
          path: app/build/outputs/apk/release/pei-automotive-*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/pei-automotive-*.apk
          generate_release_notes: true
